<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../output.css" rel="stylesheet" />
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body class="font-Inter">
    <div class="w-screen h-screen flex">
        <div class="w-[48vw] h-screen">
            <img class="object-contain md:object-cover h-screen" src="../assets/background_images/work.png" alt="Wok" />
        </div>
        <div class="w-[52vw] h-screen bg-white flex flex-col items-center">
            <img class="h-10 ml-auto mt-5 mr-5" src="../assets/icons/JobLinkIcon.png" alt="JobLink+"">
      <form class=" h-fit w-[50%] flex flex-col justify-around" id="form">
            <h1 class="text-3xl font-semibold">Create your account!</h1> <br>
            <div class="flex flex-col gap-0">
                <label for="email" class="font-bold text-md">Email adress</label>
                <input autocomplete="off"
                    class="h-9 mb-4 flex items-center shadow-lg border border-gray-300 rounded-md pl-4 focus:text-black focus:outline-2 focus:outline-[#2C72E9]"
                    type="email" name="email" placeholder="Keropipanpan" required />
                <label for="username" class="font-bold text-md">Username</label>
                <input autocomplete="off"
                    class="h-9 flex items-center shadow-lg border border-gray-300 rounded-md pl-4 focus:text-black focus:outline-2 focus:outline-[#2C72E9]"
                    type="text" name="username" placeholder="kominfomo@gmail.com" required />
                <label class="font-semibold text-xs mt-2 text-gray-400" for="username">Username may only contain
                    alphanumeric characters or single hyphens, and cannot begin or end with a hyphen.</label>
                <label class="font-bold text-md mt-4" for="password">Password</label>
                <div class="relative flex items-center">
                    <input autocomplete="off"
                        class="h-9 w-full flex items-center shadow-lg border border-gray-300 rounded-md pl-4 focus:text-black focus:outline-2 focus:outline-[#2C72E9]"
                        type="password" name="password" placeholder="********" required />
                    <i data-feather="eye" class="text-gray-300 absolute mr-9 ml-78"></i>
                </div>
                <label class="font-semibold text-xs mt-2 text-gray-400" for="password">Password should be at least 15
                    characters OR at least 8 characters including a number and a lowercase letter.</label>
                <br>
                <button class="w-full h-9 font-bold text-white text-center bg-[#2C72E9] rounded-md shadow-md"
                    type="submit">
                    Sign up
                </button>
            </div>
            <br>
            <div class="flex items-center">
                <hr class="grow border-t border-black" />
                <span class="opacity-50 pl-2 pr-2"> Or </span>
                <hr class="grow border-t border-black" />
            </div>
            <a class="self-center" href="">
                <div
                    class="w-fit mt-2 pl-2 pr-2 pb-4 pt-4 flex items-center gap-2 self-center justify-evenly border border-gray-500 rounded-md h-10">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <h1>Sign up with Google</h1>
                </div>
            </a>
            <h1 class="font-bold text-center text-xs mt-2">
                Already have an account? <a class="text-[#2C72E9] underline" href="./login.html">Sign in</a>
            </h1>
            </form>

            <footer class="w-fit font-semibold text-xs mt-auto mb-2 opacity-40">© 2026 JobLink+. All Rights Reserved |
                Powered by
                JobLink+</footer>
        </div>
    </div>


    <script>
        feather.replace();
    </script>
</body>

</html>
