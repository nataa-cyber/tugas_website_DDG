<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../output.css" rel="stylesheet" />
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body class="font-Inter">
    <div class="w-screen h-screen flex">
        <div class="w-[48vw] h-screen">
            <img class="object-contain md:object-cover h-screen" src="../assets/background_images/work.png" alt="Wok" />
        </div>
        <div class="w-[52vw] h-screen bg-white flex flex-col items-center">
            <div class="flex w-full justify-between items-center">
                <i class="w-8 h-8 ml-4" data-feather="chevron-left" onclick="history.back()"></i>
                <img class="h-10 ml-auto mt-5 mr-5" src="../assets/icons/JobLinkIcon.png" alt="JobLink+">
            </div>
            <form class="h-fit w-[50%] mt-5 flex flex-col justify-around" id="form">
                <h1 class="text-3xl font-semibold">Set a New Password</h1>
                <p class="text-gray-400 text-sm">Create a new password. Ensure it differs from
                    previous ones for security</p> <br>
                <div class="flex flex-col gap-0">
                    <label for="new_password" class="font-bold text-md">New Password</label>
                    <div class="relative flex items-center">
                        <input autocomplete="off"
                            class="h-9 w-full flex items-center shadow-lg border border-gray-300 rounded-md pl-4 focus:text-black focus:outline-2 focus:outline-[#2C72E9]"
                            type="password" name="new_password" placeholder="********" required />
                        <i data-feather="eye" class="text-gray-300 absolute mr-9 ml-78"></i>
                    </div>
                    <br>
                    <label class="font-bold text-md" for="password">Confirm Password</label>
                    <div class="relative flex items-center">
                        <input autocomplete="off"
                            class="h-9 w-full flex items-center shadow-lg border border-gray-300 rounded-md pl-4 focus:text-black focus:outline-2 focus:outline-[#2C72E9]"
                            type="password" name="password" placeholder="********" required />
                        <i data-feather="eye" class="text-gray-300 absolute mr-9 ml-78"></i>
                    </div>
                    <br>
                    <button class="w-full h-9 font-bold text-white text-center bg-[#2C72E9] rounded-md shadow-md"
                        type="submit">
                        Change Password
                    </button>
                </div>
            </form>

            <footer class="w-fit font-semibold text-xs mt-auto mb-2 opacity-40">© 2026 JobLink+. All Rights Reserved |
                Powered by
                JobLink+</footer>
        </div>
    </div>


    <script>
        feather.replace();
    </script>
</body>

</html>
